<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Hệ thống thi trắc nghiệm PTIT</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css">
</head>
<body>
<main class="login-page">
    <section class="brand-panel">
        <div class="brand-strip"></div>
        <div class="brand-overlay"></div>
        <div class="brand-content">
            <div class="brand-header">
                <div class="logo-slot" aria-label="Logo hệ thống">
                    <img th:src="@{/auth/img/logo.png}" src="/auth/img/logo.png" alt="Logo hệ thống">
                </div>
                <p class="brand-title">Hệ thống thi trắc nghiệm</p>
            </div>
        </div>
    </section>

    <section class="form-panel">
        <div class="login-card">
            <header class="card-header">
                <h2>Đăng nhập</h2>
                <p class="card-subtitle">Chọn đúng nhóm người dùng trước khi đăng nhập.</p>
            </header>

            <form class="login-form" th:action="@{/login}" action="/login" method="post" novalidate>
                <div class="field-group">
                    <label>Vai trò</label>

                    <div class="role-options" role="radiogroup" aria-label="Chọn vai trò đăng nhập">
                        <label class="role-option">
                            <input type="radio" name="role" value="GIANGVIEN"
                                   th:checked="${selectedRole == null || selectedRole == 'GIANGVIEN'}" checked>
                            <span>Giảng viên</span>
                        </label>

                        <label class="role-option">
                            <input type="radio" name="role" value="SINHVIEN"
                                   th:checked="${selectedRole == 'SINHVIEN'}">
                            <span>Sinh viên</span>
                        </label>

                        <label class="role-option">
                            <input type="radio" name="role" value="PGV"
                                   th:checked="${selectedRole == 'PGV'}">
                            <span>PGV</span>
                        </label>
                    </div>
                </div>

                <div class="field-group">
                    <label for="account" id="accountLabel">Login</label>
                    <input
                            id="account"
                            name="account"
                            type="text"
                            class="input-control"
                            placeholder="Nhập login giảng viên"
                            autocomplete="username"
                            th:value="${account}"
                            required
                    >
                    <small class="field-hint" id="accountHint">
                        Giảng viên và PGV đăng nhập bằng loginname. Sinh viên nhập mã số sinh viên.
                    </small>
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                                id="password"
                                name="password"
                                type="password"
                                class="input-control"
                                placeholder="Nhập mật khẩu"
                                autocomplete="current-password"
                                required
                        >
                        <button class="toggle-password" type="button" id="togglePassword" aria-label="Hiện mật khẩu">
                            Hiện
                        </button>
                    </div>
                </div>

                <div class="alert alert-error" id="errorBox" th:if="${error}" th:text="${error}">
                    Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng kiểm tra lại.
                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-primary" id="loginBtn">Đăng nhập</button>
                </div>
            </form>
        </div>
    </section>
</main>

<script th:src="@{/js/login.js}" src="/js/login.js"></script>
</body>
</html>
