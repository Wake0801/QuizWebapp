<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đổi mật khẩu | TTN</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-mark">TTN</div>
            <div><h1>Thi trắc nghiệm</h1><p th:text="${roleLabel}">Giảng viên</p></div>
        </div>
        <nav class="nav-menu">
            <a class="nav-link" th:href="@{/gv/home}">Tổng quan</a>
            <a class="nav-link" th:if="${isPgv}" th:href="@{/gv/mon-hoc}">Quản lý môn học</a>
            <a class="nav-link" th:if="${isPgv}" th:href="@{/gv/lop-sinh-vien}">Quản lý lớp - sinh viên</a>
            <a class="nav-link" th:if="${isPgv}" th:href="@{/gv/giao-vien}">Quản lý giáo viên</a>
            <a class="nav-link" th:href="@{/gv/bo-de}">Nhập câu hỏi thi</a>
            <a class="nav-link" th:href="@{/gv/thi-thu}">Thi thử</a>
            <a class="nav-link active" th:href="@{/gv/mat-khau}">Đổi mật khẩu</a>
            <a class="nav-link" th:href="@{/gv/dang-ky-thi}">Đăng ký thi</a>
            <a class="nav-link" th:href="@{/gv/ket-qua}">Xem kết quả bài thi</a>
            <a class="nav-link" th:href="@{/gv/bang-diem}">Bảng điểm môn học</a>
            <a class="nav-link highlight" th:if="${isPgv}" th:href="@{/gv/tai-khoan}">Tạo tài khoản</a>
        </nav>
        <a class="logout-link" th:href="@{/logout}">Đăng xuất</a>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <p class="eyebrow">Tài khoản</p>
                <h2>Đổi mật khẩu</h2>
            </div>
            <div class="user-badge">
                <strong th:text="${hoten}">Giảng viên</strong>
                <span th:text="${loginname}">login</span>
            </div>
        </header>

        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <section class="account-workbench">
            <form class="panel form-panel account-panel" th:action="@{/gv/mat-khau/doi}" method="post">
                <div class="panel-head">
                    <h3>Tài khoản đang đăng nhập</h3>
                    <span class="status-pill" th:text="${loginname}">login</span>
                </div>

                <label for="currentPassword">Mật khẩu hiện tại</label>
                <input id="currentPassword" class="input-control" name="currentPassword" type="password"
                       autocomplete="current-password" maxlength="128" required>

                <label for="newPassword">Mật khẩu mới</label>
                <input id="newPassword" class="input-control" name="newPassword" type="password"
                       autocomplete="new-password" minlength="6" maxlength="128" required>

                <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                <input id="confirmPassword" class="input-control" name="confirmPassword" type="password"
                       autocomplete="new-password" minlength="6" maxlength="128" required>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">Đổi mật khẩu</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
